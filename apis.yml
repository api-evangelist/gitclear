aid: gitclear
url: https://raw.githubusercontent.com/api-evangelist/gitclear/refs/heads/main/apis.yml
name: GitClear
kind: company
description: GitClear provides code and commit analytics for engineering teams, centered
  on its Diff Delta metric (formerly Line Impact) that scores durable code change beyond
  raw lines. Its public REST API exposes repositories, commits/data audits, Diff Delta
  reports, and developer management so teams can pull research-backed productivity and
  AI-ROI metrics programmatically.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Code Analytics
- Commit Analytics
- Developer Productivity
- Diff Delta
- Engineering Metrics
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
