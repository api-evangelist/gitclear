meters:
- name: active_developers
  description: Active developers tracked per month; the primary billing driver per plan tier.
  unit: developers
  aggregation: sum
  dimensions:
  - account
  - plan
  - team
- name: repositories
  description: Repositories analyzed, capped per plan tier.
  unit: repositories
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_data_deep_dives
  description: AI Data Deep Dives consumed per month, allocated per plan tier.
  unit: deep_dives
  aggregation: sum
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track active-developer counts and plan tier; inspect per-team Diff Delta to confirm tracked seats are productive.
- name: Allocation
  description: Map developers and repositories to teams via the Teams API to attribute spend to cost centers.
- name: Optimization
  description: Use the Developers API set_processing endpoint to mark inactive or exiled developers as not_processing; choose annual billing for the discount; right-size the plan tier to repository and data-window needs.
- name: Accountability
  description: Assign owners per team; review active-developer counts monthly against budget before renewal.
