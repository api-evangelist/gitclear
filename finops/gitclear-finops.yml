description: >-
  FinOps view of GitClear spend. GitClear bills a per-active-developer subscription
  per month, scaling by plan tier (Starter free, Pro, Elite, Enterprise). Cost is
  driven primarily by the count of active developers tracked, with plan tier setting
  repository caps, data-history window, and AI Data Deep Dive allowances. Annual
  billing is discounted relative to monthly.
notes: >-
  Per-developer rates are subject to change; verify against the GitClear pricing page
  during reconciliation. Cost optimization centers on which developers are designated
  active vs. not-processing via the Developers API.
