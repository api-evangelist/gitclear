specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: GitClear
providerId: gitclear
created: '2026-06-21'
modified: '2026-06-21'
reconciled: true
tags:
- Code Analytics
- Commit Analytics
- Developer Productivity
- Diff Delta
- Engineering Metrics
- Plans
description: >-
  GitClear is priced per active developer per month, scaling by repository count,
  data-history window, and number of AI Data Deep Dives. A free Starter tier covers
  individuals and small teams; paid tiers (Pro, Elite, Enterprise) add repositories,
  longer data windows, and on-premises options. All paid plans include a 15-day free
  trial with no credit card required, with no annual contract lock-in. API access is
  available to authenticated customers via Bearer API tokens.
notes: >-
  Prices shown are per active developer per month as published on the GitClear pricing
  page; annual billing is discounted relative to monthly. Verify the current pricing
  page on reconciliation as repository caps and Deep Dive allowances change.
sources:
- https://www.gitclear.com/pricing
- https://www.gitclear.com/api_reference
plans:
